############################################
## Starship: Theme => default
## version 1.1
############################################

# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# A continuation prompt that displays two filled in arrows
continuation_prompt = "[тИЩ](bright-blue) "

# Timeout for commands executed by starship (in milliseconds). Default: 500.
# command_timeout = 500

# A minimal left prompt
# format = """$directory\
# $git_branch\
# $git_status
# $character"""

format = """
[$time$memory_usage$jobs$directory$git_branch$git_status](bold dimmed purple)
$sudo$character"""

# move the rest of the prompt to the right
right_format = """[$cmd_duration$vagrant$docker_context$php$lua$battery$status](bold dimmed purple)"""

[battery]
full_symbol = "ЁЯФЛ "
charging_symbol = "тЪбя╕П "
discharging_symbol = "ЁЯТА "
format = '\[[$symbol$percentage]($style)\]'

[[battery.display]] # "bold red" style and discharging_symbol when capacity is between 0% and 10%
threshold = 25
style = "bold red"

[[battery.display]] # "bold yellow" style and ЁЯТж symbol when capacity is between 10% and 30%
threshold = 50
style = "yellow"
discharging_symbol = "ЁЯТж"

[[battery.display]] # "bold red" style and discharging_symbol when capacity is between 0% and 10%
threshold = 75
style = "green"
# when capacity is over 30%, the battery indicator will not be displayed

# Replace the "тЭп" symbol in the prompt with "тЮЬ"
[character] # The name of the module we are configuring is "character"
success_symbol = "[тЮЬ](bold green)" # The "success_symbol" segment is being set to "тЮЬ" with the color "bold green"
error_symbol = "[тЬЧ](bold red)[тЮЬ](bold blue)"

[cmd_duration]
min_time = 2000
format = '\[[тП▒ $duration]($style)\]'
# @since 1.1 notifications
show_notifications = true
min_time_to_notify = 60000

[directory]
style = "cyan"
# truncate_to_repo = false
truncation_symbol = "тАж/"
# truncation_length = 3
home_symbol = "ЁЯПа"
format = '(\[[$path]($style)[$read_only]($read_only_style)\])'

[docker_context]
format = '\[[$symbol$context]($style)\]'

[env_var.SIUID]
style = "purple"
format = '\[[$env_value]($style)\]'
default = "unknown user"

[git_branch]
symbol = "юВа"
format = '\[[$symbol$branch]($style)\]'

[git_status]
# @since 1.1 disabled
disabled = true
format = '([\[$all_status$ahead_behind\]]($style))'

[line_break]
disabled = false

[lua]
format = '\[[$symbol($version)]($style)\]'

[memory_usage]
disabled = false
# threshold = -1
threshold = 70
# symbol = " "
style = "bold dimmed green"
format = '\[$symbol[[$ram_pct](bold dimmed blue)([|](dimmed red)[$swap_pct](bold dimmed yellow))]($style)\]'

[package]
disabled = true

[php]
version_format = "v${raw}"
symbol = "ЁЯРШ"
format = '\[[$symbol($version)]($style)\]'

[shell]
disabled = false
format = '\[[$indicator]($style)\]'

[status]
disabled = false
format = '\[[$symbol$status]($style)\]'

[sudo]
disabled = false
style = 'bold green'
symbol = 'ЁЯлЖ '
# symbol = 'ЁЯСйтАНЁЯТ╗ '

[time]
disabled = false
# style = "bold dimmed blue"
style = "blue"
format = '\[[$time]($style)\]'

[vagrant]
format = '\[[$symbol($version)]($style)\]'

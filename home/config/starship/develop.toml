# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = false

# A continuation prompt that displays two filled in arrows
continuation_prompt = "[тИЩ](bright-blue) "

# A minimal left prompt
# format = """$directory\
# $git_branch\
# $git_status
# $character"""

format = """
[$time$memory_usage$jobs$directory$git_branch$git_status](bold dimmed purple)
$sudo$env_var$character"""

# move the rest of the prompt to the right
right_format = """[$cmd_duration$php$battery$status](bold dimmed purple)"""

[battery]
full_symbol = "ЁЯФЛ "
charging_symbol = "тЪбя╕П "
discharging_symbol = "ЁЯТА "
format = '\[[$symbol$percentage]($style)\]'

[[battery.display]] # "bold red" style and discharging_symbol when capacity is between 0% and 10%
threshold = 10
style = "bold red"

[[battery.display]] # "bold yellow" style and ЁЯТж symbol when capacity is between 10% and 30%
threshold = 30
style = "bold yellow"
discharging_symbol = "ЁЯТж"

[[battery.display]] # "bold red" style and discharging_symbol when capacity is between 0% and 10%
threshold = 100
style = "bold green"
# when capacity is over 30%, the battery indicator will not be displayed

# Replace the "тЭп" symbol in the prompt with "тЮЬ"
[character] # The name of the module we are configuring is "character"
success_symbol = "[тЮЬ](bold green)" # The "success_symbol" segment is being set to "тЮЬ" with the color "bold green"

[cmd_duration]
min_time = 500
format = '\[[тП▒ $duration]($style)\]'

[directory]
style = "cyan"
truncation_symbol = "тАж/"
# truncation_length = 3
home_symbol = "ЁЯПа"
format = '(\[[$path]($style)[$read_only]($read_only_style)\])'

[env_var.SIUID]
style = "purple"
format = '\[[$env_value]($style)\]'
default = "unknown user"

[git_branch]
format = '\[[$symbol$branch]($style)\]'

[git_status]
format = '([\[$all_status$ahead_behind\]]($style))'

[package]
disabled = true

[memory_usage]
disabled = false
threshold = -1
# symbol = " "
style = "bold dimmed green"
format = '\[$symbol[[$ram_pct](bold dimmed blue)([|](dimmed red)[$swap_pct](bold dimmed yellow))]($style)\]'

[php]
version_format = "v${raw}"
symbol = "ЁЯРШ "
format = '\[[$symbol($version)]($style)\]'

[shell]
# disabled = false
format = '\[[$indicator]($style)\]'

[status]
disabled = false
format = '\[[$symbol$status]($style)\]'

[sudo]
disabled = false
style = 'bold green'
symbol = 'ЁЯлЖ '
# symbol = 'ЁЯСйтАНЁЯТ╗ '

[time]
disabled = false
style = "bold dimmed blue"
format = '\[[$time]($style)\]'
